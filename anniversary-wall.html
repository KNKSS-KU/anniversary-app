<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anniversary Wall</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Sarabun:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --o:#FF8200;--ol:#FF9E3D;--od:#CC6800;
  --gray1:#74787B;--gray2:#222221;
  --serif:'Cormorant Garamond',serif;
  --disp:'Cinzel',serif;--thai:'Sarabun',sans-serif;
  --border:0.5px solid rgba(0,0,0,.08);
}
html,body{height:100%;overflow:hidden}
body{background:#EDE8E1;font-family:var(--thai);color:var(--gray2)}

/* HEADER */
.wall-header{
  position:fixed;top:0;left:0;right:0;z-index:50;
  background:rgba(255,255,255,.96);backdrop-filter:blur(10px);
  border-bottom:var(--border);padding:0 24px;height:72px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.h-left{display:flex;align-items:center;gap:10px}
.h-logo{height:48px;width:auto;object-fit:contain;display:none}
.h-brand{font-family:var(--disp);font-size:18px;letter-spacing:.08em}
.h-year{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--o);margin-left:2px}
.h-count{font-size:13px;color:var(--gray1);border:var(--border);border-radius:100px;padding:2px 10px;background:#fff}
.filter-btn{font-family:var(--thai);font-size:13px;padding:6px 14px;border-radius:100px;border:var(--border);background:transparent;color:var(--gray1);cursor:pointer;transition:all .2s}
.filter-btn.active{background:var(--o);color:#fff;border-color:var(--o)}
.h-right{display:flex;align-items:center;gap:8px}
.btn-admin{font-size:11px;padding:5px 10px;border-radius:100px;border:var(--border);background:transparent;color:var(--gray1);cursor:pointer;text-decoration:none;transition:all .2s}
.btn-admin:hover{background:#f5f3ef}

/* MAIN SCROLL AREA */
.main{
  position:fixed;top:72px;left:0;right:0;bottom:48px;
  overflow-y:auto;overflow-x:hidden;
}
.cards-wrap{}

/* BANNER */
.wall-banner{width:100%;display:block;object-fit:contain;}
.wall-banner.hidden{display:none}

/* CTA */
.banner-cta{
  width:100%;padding:12px 20px;
  background:rgba(255,255,255,.96);backdrop-filter:blur(10px);
  border-bottom:var(--border);
  display:flex;align-items:center;justify-content:center;
}
.btn-greet{
  font-family:var(--disp);font-size:13px;letter-spacing:.08em;
  padding:10px 32px;border-radius:100px;
  background:var(--o);color:#fff;border:none;cursor:pointer;
  text-decoration:none;transition:all .25s;
  box-shadow:0 4px 16px rgba(255,130,0,.35);
  display:inline-flex;align-items:center;gap:8px;
}
.btn-greet:hover{background:var(--od);transform:translateY(-2px)}

/* STATUS BAR */
.nc-bar{position:fixed;top:72px;left:0;right:0;z-index:40;font-size:12px;padding:5px 20px;display:none;align-items:center;gap:8px;background:#fff8e1;border-bottom:0.5px solid #ffe082;color:#7c6000}
.nc-bar.err{background:#fff0f0;border-color:#ffcdd2;color:#b71c1c}
.nc-bar.ok{background:#f0faf5;border-color:#a5d6a7;color:#1b5e20}
.nc-bar.show{display:flex}
.nc-spinner{width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* CARDS GRID */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:12px;
}

/* CARD */
.card{background:#fff;border-radius:10px;border:var(--border);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s;opacity:0;animation:cardIn .4s forwards;display:flex;flex-direction:column}
.card:hover{box-shadow:0 0 0 2px rgba(255,130,0,.5),0 0 20px rgba(255,130,0,.3),0 8px 24px rgba(0,0,0,.15);transform:translateY(-3px)}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-img-wrap{position:relative;width:100%;padding-top:65%;overflow:hidden;flex-shrink:0}
.card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;background:#f0ede8}
.card-img-placeholder{position:absolute;inset:0;background:linear-gradient(135deg,#f0ede8,#e5e0d8);display:flex;align-items:center;justify-content:center;font-size:28px;opacity:.3}
.card-bottom{padding:7px 10px;background:#fff;border-top:var(--border)}
.card-msg{display:none}
.card-footer{display:flex;align-items:center;gap:6px}
.card-av{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:#fff}
.card-name{font-size:11px;font-weight:500;color:var(--gray2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-time{font-size:9px;color:var(--gray1);white-space:nowrap}
.card-new{font-size:8px;background:#fff3e0;color:var(--o);border-radius:100px;padding:1px 5px;font-weight:600;flex-shrink:0}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center}
.empty-icon{font-size:40px;opacity:.25}
.empty-title{font-family:var(--disp);font-size:18px;color:var(--gray1);letter-spacing:.05em}
.empty-sub{font-size:13px;color:var(--gray1);line-height:1.6}

/* PAGINATION */
.pager{position:fixed;bottom:0;left:0;right:0;height:48px;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:var(--border);display:flex;align-items:center;justify-content:center;gap:10px;z-index:50}
.pager-btn{width:30px;height:30px;border-radius:50%;border:var(--border);background:transparent;cursor:pointer;font-size:16px;color:var(--gray2);display:flex;align-items:center;justify-content:center;transition:all .2s}
.pager-btn:hover:not(:disabled){background:var(--o);color:#fff;border-color:var(--o)}
.pager-btn:disabled{opacity:.3;cursor:not-allowed}
.dots{display:flex;gap:5px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,.15);cursor:pointer;transition:all .25s;border:none;padding:0}
.dot.active{width:18px;border-radius:3px;background:var(--o)}

/* POPUP */
.pop-backdrop{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:16px}
.pop-backdrop.show{display:flex}
.pop-card{background:#fff;border-radius:16px;max-width:800px;width:100%;max-height:88vh;overflow-y:auto;position:relative;animation:popIn .25s ease}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.pop-close{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,.5);cursor:pointer;font-size:16px;color:#fff;display:flex;align-items:center;justify-content:center;z-index:20}
.pop-img{width:100%;height:auto;object-fit:contain;display:block}
.pop-img.hidden{display:none}
.pop-body{padding:16px 20px 20px}
.pop-info{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.pop-name{font-size:15px;font-weight:600}
.pop-dept{font-size:12px;color:var(--gray1)}
.pop-time{font-size:11px;color:var(--gray1);margin-left:auto;white-space:nowrap}
.pop-msg{font-family:var(--serif);font-size:16px;line-height:1.8;color:var(--gray2);padding-top:14px;border-top:var(--border)}
@media(max-width:600px){
  .pop-backdrop{padding:12px}
  .pop-card{border-radius:16px;max-width:100%;max-height:90vh;width:100%}
  .pop-msg{font-size:14px}
}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.show{display:flex}
.lightbox img{max-width:95vw;max-height:92vh;object-fit:contain;border-radius:4px}
.lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;opacity:.7;background:none;border:none;line-height:1}
.lightbox-close:hover{opacity:1}
.lb-info{position:absolute;bottom:0;left:0;right:0;padding:16px 24px;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;display:flex;align-items:center;gap:12px}
.lb-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff}
.lb-name{font-size:14px;font-weight:600}
.lb-msg{font-size:13px;opacity:.8;margin-top:2px}

/* TOAST */
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(34,34,33,.88);color:#fff;font-size:13px;padding:8px 18px;border-radius:100px;z-index:300;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* RESPONSIVE */
@media(max-width:768px){
  .cards-grid{grid-template-columns:1fr;gap:10px;padding:12px}
  .wall-header{height:60px}
  .main{top:60px}
}
</style>
</head>
<body>

<div class="wall-header">
  <div class="h-left">
    <img class="h-logo" id="hLogo" src="" alt="logo">
    <!--<div class="h-brand" id="hBrand">ANNIVERSARY<span class="h-year" id="hYear"></span></div>-->
    <!--<div class="h-count"><span id="liveCount">0</span> คำอวยพร</div>-->
    <!--<button class="filter-btn active" onclick="setFilter('all')">ทั้งหมด</button>
    <button class="filter-btn" onclick="setFilter('new')">ใหม่</button>-->
  </div>
  <div class="h-right">
    <!--<a class="btn-admin" href="aufsicht.html">⚙ Admin</a>-->
    <a class="btn-greet" id="headerGreetBtn" href="anniversary-greeting.html" style="display:none">✦ ส่งคำอวยพร</a>
  </div>
</div>

<div class="nc-bar" id="ncBar">
  <div class="nc-spinner" id="ncSpin"></div>
  <span id="ncMsg">กำลังโหลด...</span>
</div>

<!-- MAIN SCROLL -->
<div class="main" id="mainScroll">
  <!-- BANNER -->
  <div id="bannerSection" style="display:none">
    <img class="wall-banner" id="wallBanner" src="" alt="banner">
    <div class="banner-cta">
      <a class="btn-greet" href="anniversary-greeting.html">✦ ส่งคำอวยพร</a>
    </div>
  </div>

  <!-- CARDS -->
  <div class="cards-wrap">
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <!-- PAGINATION -->
  <div style="display:flex;justify-content:center;align-items:center;gap:10px;padding:10px 0 60px">
    <button class="pager-btn" id="btnPrev" onclick="navigate(-1)">&#8592;</button>
    <div class="dots" id="dots"></div>
    <button class="pager-btn" id="btnNext" onclick="navigate(1)">&#8594;</button>
  </div>
</div>

<!-- POPUP -->
<div class="pop-backdrop" id="pop" onclick="closePop(event)">
  <div class="pop-card">
    <button class="pop-close" onclick="closePop()">✕</button>
    <img class="pop-img hidden" id="popImg" src="" alt="">
    <div class="pop-body">
      <div class="pop-info">
        <div>
          <div class="pop-name" id="popName"></div>
          <div class="pop-dept" id="popDept"></div>
        </div>
        <div class="pop-time" id="popTime"></div>
      </div>
      <div class="pop-msg" id="popMsg"></div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lbImg" src="" alt="">
  <div class="lb-info">
    <div class="lb-av" id="lbAv"></div>
    <div>
      <div class="lb-name" id="lbName"></div>
      <div class="lb-msg" id="lbMsg"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="supabase.js"></script>
<script>
let allData = [], filtered = [], curFilter = 'all', curPage = 0;
const PER_PAGE = 8;
let settings = {};

function setBar(state, msg) {
  const bar = document.getElementById('ncBar');
  document.getElementById('ncMsg').textContent = msg;
  document.getElementById('ncSpin').style.display = state === 'loading' ? 'block' : 'none';
  bar.className = 'nc-bar show ' + (state === 'loading' ? '' : state);
  if (state === 'ok') setTimeout(() => bar.classList.remove('show'), 2500);
}

async function loadData() {
  setBar('loading', 'กำลังโหลดข้อมูล...');
  try {
    const [wishes, sets] = await Promise.all([
      sb.get('wishes', '?status=eq.approved&order=created_at.desc'),
      sb.get('settings', '?select=setting_key,setting_value')
    ]);
    sets.forEach(r => settings[r.setting_key] = r.setting_value);

    const year = settings.header_th?.match(/\d+/)?.[0] || '30';
    document.getElementById('hYear').textContent = ` — ${year} ปี`;

    if (settings.logo_image) {
      document.getElementById('hLogo').src = settings.logo_image;
      document.getElementById('hLogo').style.display = 'block';
      document.getElementById('hBrand').style.display = 'none';
    }

    if (settings.banner_image) {
      document.getElementById('wallBanner').src = settings.banner_image;
      document.getElementById('bannerSection').style.display = 'block';
    } else {
      document.getElementById('headerGreetBtn').style.display = 'flex';
    }

    allData = wishes;
    applyFilter(curFilter);
    setBar('ok', `✓ โหลดสำเร็จ — ${wishes.length} คำอวยพร`);
  } catch(e) {
    setBar('err', '❌ โหลดไม่สำเร็จ: ' + e.message);
  }
}

function applyFilter(f) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', (f==='all'&&b.textContent==='ทั้งหมด')||(f==='new'&&b.textContent==='ใหม่'))
  );
  filtered = f === 'new' ? allData.filter(d => isNewEntry(d.created_at)) : [...allData];
  document.getElementById('liveCount').textContent = filtered.length;
  curPage = 0;
  renderPage();
}
function setFilter(f) { applyFilter(f); }

function renderPage() {
  const grid = document.getElementById('cardsGrid');
  const total = Math.ceil(filtered.length / PER_PAGE);
  const page  = filtered.slice(curPage * PER_PAGE, (curPage+1) * PER_PAGE);

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">✦</div>
      <div class="empty-title">ยังไม่มีคำอวยพร</div>
      <div class="empty-sub">เป็นคนแรกที่ส่งคำอวยพรได้เลย!</div>
    </div>`;
    buildDots(0);
    return;
  }

  grid.innerHTML = page.map((d, i) => {
    const col    = colorFor(d.name);
    const ni     = isNewEntry(d.created_at) ? '<span class="card-new">NEW</span>' : '';
    const hasImg = d.avatar && d.avatar.startsWith('http');
    return `<div class="card" style="animation-delay:${i*40}ms" onclick='openPop(${JSON.stringify(d).replace(/'/g,"&#39;")})'>
      <div class="card-img-wrap">
        ${hasImg
          ? `<img class="card-img" src="${escHtml(d.avatar)}" alt="" loading="lazy">`
          : `<div class="card-img-placeholder">✦</div>`
        }
      </div>
      <div class="card-bottom">
        <div class="card-msg">${escHtml(d.message)}</div>
        <div class="card-footer">
          <div class="card-name">${escHtml(d.name)}</div>
          <div class="card-time">${new Date(d.created_at).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'})}</div>
          ${ni}
        </div>
      </div>
    </div>`;
  }).join('');

  buildDots(total);
  document.getElementById('mainScroll').scrollTo(0, 0);
  document.getElementById('btnPrev').disabled = curPage === 0;
  document.getElementById('btnNext').disabled = curPage >= total - 1;
}

function navigate(dir) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const np = Math.max(0, Math.min(total-1, curPage+dir));
  if (np !== curPage) { curPage = np; renderPage(); }
}

function buildDots(total) {
  const c = document.getElementById('dots');
  c.innerHTML = '';
  for (let i = 0; i < Math.min(total, 10); i++) {
    const b = document.createElement('button');
    b.className = 'dot' + (i===0?' active':'');
    b.setAttribute('data-i', i);
    b.onclick = () => { curPage = i; renderPage(); };
    c.appendChild(b);
  }
  document.querySelectorAll('.dot[data-i]').forEach(b =>
    b.classList.toggle('active', +b.getAttribute('data-i') === curPage)
  );
}

function openLightbox(d) {
  document.getElementById('lbImg').src = d.avatar;
  document.getElementById('lbAv').textContent = initials(d.name);
  document.getElementById('lbAv').style.background = colorFor(d.name);
  document.getElementById('lbName').textContent = d.name + (d.dept ? ` (${d.dept})` : '');
  document.getElementById('lbMsg').textContent = d.message;
  document.getElementById('lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.body.style.overflow = '';
}

function openPop(d) {
  document.getElementById('popName').textContent = d.name;
  document.getElementById('popDept').textContent = d.dept || '';
  document.getElementById('popTime').textContent = new Date(d.created_at).toLocaleString('th-TH');
  document.getElementById('popMsg').textContent = d.message;
  const img = document.getElementById('popImg');
  if (d.avatar && d.avatar.startsWith('http')) { img.src = d.avatar; img.classList.remove('hidden'); }
  else img.classList.add('hidden');
  document.getElementById('pop').classList.add('show');
}
function closePop(e) {
  if (e && e.target !== document.getElementById('pop')) return;
  document.getElementById('pop').classList.remove('show');
}

function showToast(t) {
  const el = document.getElementById('toast');
  el.textContent = t; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

setInterval(async () => {
  try {
    const data = await sb.get('wishes', '?status=eq.approved&order=created_at.desc');
    if (data.length !== allData.length) {
      allData = data;
      applyFilter(curFilter);
      if (data.length > allData.length) showToast('✦ มีคำอวยพรใหม่เข้ามา!');
    }
  } catch(_) {}
}, 30000);

loadData();
</script>
</body>
</html>
