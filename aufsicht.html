<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Anniversary</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --o:#FF8200;--od:#CC6800;--ol:#FFF3E0;
  --g:#3DAA6B;--gl:#E8F5E9;
  --r:#E53935;--rl:#FFEBEE;
  --gray1:#74787B;--gray2:#222221;--gray3:#f7f5f2;
  --disp:'Cinzel',serif;--thai:'Sarabun',sans-serif;
  --border:0.5px solid rgba(0,0,0,.1);
}
body{font-family:var(--thai);background:#EDE8E1;color:var(--gray2);min-height:100vh}

/* LOGIN */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#2c3e50,#34495e)}
.login-card{background:#fff;border-radius:16px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 25px 50px rgba(0,0,0,.3);text-align:center}
.login-brand{font-family:var(--disp);font-size:16px;letter-spacing:.12em;color:var(--o);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--gray1);margin-bottom:32px}
.login-card label{display:block;text-align:left;font-size:12px;font-weight:500;color:var(--gray1);margin-bottom:6px}
.login-card input{width:100%;padding:10px 14px;border:var(--border);border-radius:10px;font-family:var(--thai);font-size:14px;margin-bottom:16px;background:#fafaf9;outline:none;transition:border-color .2s}
.login-card input:focus{border-color:var(--o);background:#fff}
.btn-login{width:100%;padding:13px;font-family:var(--disp);font-size:12px;letter-spacing:.1em;background:var(--o);color:#fff;border:none;border-radius:10px;cursor:pointer;transition:all .25s}
.btn-login:hover{background:var(--od)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-err{background:var(--rl);color:var(--r);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;text-align:left}

/* DASHBOARD */
#dashPage{display:none}
body.in #loginPage{display:none}
body.in #dashPage{display:block}

/* HEADER */
.adm-header{background:#fff;border-bottom:var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.h-brand{font-family:var(--disp);font-size:14px;letter-spacing:.08em}
.h-links{display:flex;gap:8px;align-items:center}
.h-link{font-size:12px;padding:5px 12px;border-radius:100px;border:var(--border);text-decoration:none;color:var(--gray1);background:#fff;transition:all .2s;cursor:pointer}
.h-link:hover{background:var(--gray3)}
.h-link.primary{background:var(--o);color:#fff;border-color:var(--o)}
.h-link.primary:hover{background:var(--od)}
.h-link.danger{background:var(--r);color:#fff;border-color:var(--r)}

/* LAYOUT */
.adm-main{max-width:900px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;gap:20px}

/* CARD */
.acard{background:#fff;border-radius:12px;border:var(--border);overflow:hidden}
.acard-head{padding:14px 20px;border-bottom:var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.acard-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.acard-title .icon{font-size:16px}
.acard-body{padding:20px}

/* STATUS */
.status-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:var(--border);font-size:13px;margin-bottom:16px;background:var(--gray3)}
.status-row.ok{background:var(--gl);border-color:#a5d6a7;color:#1b5e20}
.status-row.err{background:var(--rl);border-color:#ef9a9a;color:var(--r)}
.status-row.loading{background:#fff8e1;border-color:#ffe082;color:#7c6000}
.spin{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* FORM */
.form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-row label{font-size:12px;font-weight:500;color:var(--gray1)}
.form-row input,.form-row textarea{font-family:var(--thai);font-size:13px;padding:8px 12px;border:var(--border);border-radius:8px;background:#fafaf9;color:var(--gray2);outline:none;width:100%;transition:border-color .2s}
.form-row input:focus,.form-row textarea:focus{border-color:var(--o);background:#fff}
.form-row .hint{font-size:11px;color:var(--gray1)}

/* BUTTONS */
.btn{font-family:var(--thai);font-size:13px;font-weight:500;padding:8px 16px;border-radius:8px;border:var(--border);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--o);color:#fff;border-color:var(--o)}
.btn-primary:hover{background:var(--od)}
.btn-ghost{background:transparent;color:var(--gray1)}
.btn-ghost:hover{background:var(--gray3)}
.btn-danger{background:var(--r);color:#fff;border-color:var(--r)}
.btn-danger:hover{background:#c62828}
.btn-sm{font-size:12px;padding:5px 10px;border-radius:6px}
.btn-approve{background:var(--gl);color:#1b5e20;border-color:#a5d6a7}
.btn-approve:hover{background:#3DAA6B;color:#fff}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-box{background:var(--gray3);border-radius:8px;padding:14px;text-align:center}
.stat-num{font-size:24px;font-weight:600;color:var(--o)}
.stat-label{font-size:11px;color:var(--gray1);margin-top:2px}

/* SETTINGS GRID */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* WISH GRID */
.w-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.w-card{border:var(--border);border-radius:8px;padding:12px;background:var(--gray3);display:flex;flex-direction:column;gap:8px}
.w-card.pending{border-color:#ffe082;background:#fff8e1}
.w-card-top{display:flex;align-items:center;gap:8px}
.w-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.w-name{font-size:13px;font-weight:600;flex:1}
.w-dept{font-size:11px;color:var(--gray1)}
.w-time{font-size:10px;color:var(--gray1)}
.w-msg{font-size:12px;color:var(--gray2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.w-actions{display:flex;gap:6px;flex-wrap:wrap}

/* PAGER */
.g-pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px}
.g-pager button{font-family:var(--thai);font-size:12px;padding:4px 10px;border-radius:6px;border:var(--border);background:#fff;cursor:pointer;color:var(--gray2)}
.g-pager button.active{background:var(--o);color:#fff;border-color:var(--o)}
.g-pager button:disabled{opacity:.35;cursor:not-allowed}
.g-pager .info{font-size:12px;color:var(--gray1)}

/* AVATAR GRID */
.av-grid{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.av-item{position:relative}
.av-item img{width:64px;height:64px;border-radius:10px;border:var(--border);object-fit:cover}
.av-del{position:absolute;top:-6px;right:-6px;background:var(--r);color:#fff;border:none;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}

/* PREDEFINED */
.pw-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:var(--border);border-radius:8px;margin-bottom:8px;gap:10px;background:var(--gray3)}
.pw-item span{flex:1;font-size:13px}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(34,34,33,.88);color:#fff;font-size:13px;padding:8px 18px;border-radius:100px;z-index:300;opacity:0;transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* CONFIRM MODAL */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-wrap.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;max-width:360px;width:100%;text-align:center}
.modal h3{font-size:16px;font-weight:600;margin-bottom:8px}
.modal p{font-size:13px;color:var(--gray1);line-height:1.6;margin-bottom:18px}

/* NAV TABS */
.nav-tabs{display:flex;gap:4px;background:var(--gray3);padding:4px;border-radius:10px;margin-bottom:20px}
.nav-tab{flex:1;font-family:var(--thai);font-size:12px;padding:7px;border:none;border-radius:7px;background:transparent;cursor:pointer;color:var(--gray1);transition:all .2s;text-align:center}
.nav-tab.active{background:#fff;color:var(--gray2);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}

@media(max-width:500px){.stats-row{grid-template-columns:1fr 1fr}.w-grid{grid-template-columns:1fr}.settings-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-brand">ANNIVERSARY</div>
    <p class="login-sub">Admin Dashboard</p>
    <div class="login-err" id="loginErr"></div>
    <label>Email</label>
    <input type="email" id="lEmail" placeholder="admin@example.com">
    <label>Password</label>
    <input type="password" id="lPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" id="btnLogin" onclick="doLogin()">SIGN IN →</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashPage">
  <div class="adm-header">
    <div class="h-brand">ADMIN — ANNIVERSARY</div>
    <div class="h-links">
      <a href="anniversary-wall.html" class="h-link">🖼 Wall</a>
      <a href="anniversary-greeting.html" class="h-link primary">✦ ส่งคำอวยพร</a>
      <button class="h-link danger" onclick="doLogout()">ออก</button>
    </div>
  </div>

  <div class="adm-main">

    <!-- STATS -->
    <div class="acard">
      <div class="acard-head">
        <div class="acard-title"><span class="icon">📊</span> สถิติ</div>
        <button class="btn btn-sm btn-ghost" onclick="loadAll()">↻ รีเฟรช</button>
      </div>
      <div class="acard-body">
        <div class="stats-row">
          <div class="stat-box"><div class="stat-num" id="stTotal">—</div><div class="stat-label">คำอวยพรทั้งหมด</div></div>
          <div class="stat-box"><div class="stat-num" id="stPending">—</div><div class="stat-label">รออนุมัติ</div></div>
          <div class="stat-box"><div class="stat-num" id="stNew">—</div><div class="stat-label">ใหม่ (24 ชม.)</div></div>
        </div>
      </div>
    </div>

    <!-- MANAGE WISHES -->
    <div class="acard">
      <div class="acard-head">
        <div class="acard-title"><span class="icon">💬</span> จัดการคำอวยพร</div>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="wFilter" onchange="renderWishes()" style="font-family:var(--thai);font-size:12px;padding:4px 8px;border-radius:6px;border:var(--border)">
            <option value="all">ทั้งหมด</option>
            <option value="pending">รออนุมัติ</option>
            <option value="approved">อนุมัติแล้ว</option>
          </select>
          <button class="btn btn-sm btn-danger" onclick="confirmDeleteAll()">ลบทั้งหมด</button>
        </div>
      </div>
      <div class="acard-body">
        <div id="wList"><div style="text-align:center;color:var(--gray1);font-size:13px;padding:30px">กำลังโหลด...</div></div>
        <div class="g-pager" id="wPager"></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="acard">
      <div class="acard-head">
        <div class="acard-title"><span class="icon">⚙</span> ตั้งค่าเว็บไซต์</div>
        <button class="btn btn-sm btn-primary" onclick="saveSettings()">บันทึก</button>
      </div>
      <div class="acard-body">
        <div class="status-row" id="cfgStatus" style="display:none"></div>
        <div class="settings-grid">
          <div class="form-row"><label>Header (TH)</label><input type="text" id="header_th"></div>
          <div class="form-row"><label>Header (EN)</label><input type="text" id="header_en"></div>
          <div class="form-row"><label>Subtitle (TH)</label><input type="text" id="subtitle_th"></div>
          <div class="form-row"><label>Subtitle (EN)</label><input type="text" id="subtitle_en"></div>
        </div>
        <div class="form-row"><label>รูปพื้นหลัง (URL)</label><input type="text" id="bg_image" placeholder="https://..."></div>
      </div>
    </div>

    <!-- AVATARS + PREDEFINED -->
    <div class="acard">
      <div class="acard-head"><div class="acard-title"><span class="icon">🎨</span> Avatar & คำอวยพรสำเร็จรูป</div></div>
      <div class="acard-body">
        <div class="nav-tabs">
          <button class="nav-tab active" onclick="switchTab('avTab',this)">รูปโปรไฟล์</button>
          <button class="nav-tab" onclick="switchTab('pwTab',this)">คำอวยพรสำเร็จรูป</button>
        </div>

        <!-- AVATARS -->
        <div id="avTab">
          <div style="display:flex;gap:10px;margin-bottom:12px">
            <input type="text" id="newAvUrl" placeholder="URL รูปภาพ..." style="flex:1;padding:8px 12px;border:var(--border);border-radius:8px;font-family:var(--thai);font-size:13px;background:#fafaf9;outline:none">
            <button class="btn btn-primary" onclick="addAvatar()"><span>+ เพิ่ม</span></button>
          </div>
          <div class="av-grid" id="avGrid">กำลังโหลด...</div>
        </div>

        <!-- PREDEFINED -->
        <div id="pwTab" style="display:none">
          <div style="margin-bottom:12px">
            <textarea id="newPwText" rows="2" placeholder="พิมพ์คำอวยพรใหม่..." style="width:100%;padding:8px 12px;border:var(--border);border-radius:8px;font-family:var(--thai);font-size:13px;background:#fafaf9;outline:none;resize:none;margin-bottom:8px"></textarea>
            <button class="btn btn-primary btn-sm" onclick="addPredefined()">+ เพิ่มคำอวยพร</button>
          </div>
          <div id="pwList">กำลังโหลด...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-wrap" id="modalWrap">
  <div class="modal">
    <h3 id="modalTitle">ยืนยัน</h3>
    <p id="modalMsg"></p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-danger" id="modalConfirm">ยืนยัน</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="supabase.js"></script>
<script>
/* ── State ── */
let allWishes = [], wPage = 0;
const W_PER = 12;

/* ── Auth ── */
async function doLogin() {
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  const err   = document.getElementById('loginErr');
  const btn   = document.getElementById('btnLogin');
  err.style.display = 'none';
  if (!email || !pass) { showLoginErr('กรุณากรอก Email และ Password'); return; }
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
  try {
    await sbAuth.login(email, pass);
    showDash();
  } catch(e) {
    showLoginErr('Email หรือ Password ไม่ถูกต้อง');
  } finally { btn.disabled = false; btn.textContent = 'SIGN IN →'; }
}

function showLoginErr(msg) { const e=document.getElementById('loginErr'); e.textContent='❌ '+msg; e.style.display='block'; }

async function doLogout() {
  if (!confirm('ออกจากระบบ?')) return;
  await sbAuth.logout();
  document.body.classList.remove('in');
}

function showDash() { document.body.classList.add('in'); loadAll(); }

/* ── Load All ── */
async function loadAll() {
  await Promise.all([loadWishes(), loadSettings(), loadAvatars(), loadPredefined()]);
}

/* ── Wishes ── */
async function loadWishes() {
  try {
    allWishes = await sbAdmin.get('wishes', '?order=created_at.desc');
    updateStats();
    renderWishes();
  } catch(e) { toast('โหลดคำอวยพรไม่สำเร็จ: '+e.message, false); }
}

function updateStats() {
  const cutoff = Date.now() - 86400000;
  document.getElementById('stTotal').textContent   = allWishes.length;
  document.getElementById('stPending').textContent = allWishes.filter(w=>w.status==='pending').length;
  document.getElementById('stNew').textContent     = allWishes.filter(w=>new Date(w.created_at)>cutoff).length;
}

function renderWishes() {
  const f = document.getElementById('wFilter').value;
  let list = f==='all' ? [...allWishes] : allWishes.filter(w=>w.status===f);
  const total = Math.ceil(list.length/W_PER);
  if (wPage >= total) wPage = Math.max(0, total-1);
  const page = list.slice(wPage*W_PER, (wPage+1)*W_PER);

  const el = document.getElementById('wList');
  if (!list.length) { el.innerHTML='<div style="text-align:center;color:var(--gray1);font-size:13px;padding:30px">ไม่มีข้อมูล</div>'; document.getElementById('wPager').innerHTML=''; return; }

  el.innerHTML = '<div class="w-grid">' + page.map(w => {
    const col = colorFor(w.name);
    const isPending = w.status === 'pending';
    return `<div class="w-card${isPending?' pending':''}" id="wc_${w.id}">
      <div class="w-card-top">
        <div class="w-av" style="background:${col}">${initials(w.name)}</div>
        <div>
          <div class="w-name">${escHtml(w.name)}</div>
          <div class="w-dept">${escHtml(w.dept||'')}</div>
        </div>
        <div class="w-time" style="margin-left:auto">${new Date(w.created_at).toLocaleDateString('th-TH')}</div>
      </div>
      <div class="w-msg">${escHtml(w.message)}</div>
      <div class="w-actions">
        ${isPending
          ? `<button class="btn btn-sm btn-approve" onclick="updateStatus(${w.id},'approved')">✓ อนุมัติ</button>`
          : `<button class="btn btn-sm btn-ghost" onclick="updateStatus(${w.id},'pending')">↩ ถอน</button>`
        }
        <button class="btn btn-sm btn-danger" onclick="confirmDeleteOne(${w.id},'${escHtml(w.name)}')">ลบ</button>
      </div>
    </div>`;
  }).join('') + '</div>';

  // Pager
  const pg = document.getElementById('wPager');
  if (total <= 1) { pg.innerHTML=''; return; }
  pg.innerHTML =
    `<button ${wPage===0?'disabled':''} onclick="wGoPage(${wPage-1})">&#8592;</button>`+
    `<span class="info">${wPage+1} / ${total}</span>`+
    `<button ${wPage>=total-1?'disabled':''} onclick="wGoPage(${wPage+1})">&#8594;</button>`;
}

function wGoPage(p) { wPage=p; renderWishes(); }

async function updateStatus(id, status) {
  try {
    await sbAdmin.patch('wishes', `?id=eq.${id}`, { status });
    const w = allWishes.find(x=>x.id===id);
    if (w) w.status = status;
    updateStats(); renderWishes();
    toast(status==='approved' ? '✓ อนุมัติแล้ว' : '↩ ถอนการอนุมัติแล้ว');
  } catch(e) { toast('ไม่สำเร็จ: '+e.message, false); }
}

function confirmDeleteOne(id, name) {
  document.getElementById('modalTitle').textContent = 'ยืนยันการลบ';
  document.getElementById('modalMsg').textContent = `ลบคำอวยพรของ "${name}" ถาวร?`;
  document.getElementById('modalConfirm').onclick = () => deleteOne(id);
  document.getElementById('modalWrap').classList.add('show');
}
async function deleteOne(id) {
  closeModal();
  try {
    await sbAdmin.delete('wishes', `?id=eq.${id}`);
    allWishes = allWishes.filter(w=>w.id!==id);
    updateStats(); renderWishes(); toast('✓ ลบแล้ว');
  } catch(e) { toast('ลบไม่สำเร็จ',false); }
}

function confirmDeleteAll() {
  const f = document.getElementById('wFilter').value;
  const targets = f==='all' ? allWishes : allWishes.filter(w=>w.status===f);
  document.getElementById('modalTitle').textContent = 'ลบทั้งหมด?';
  document.getElementById('modalMsg').textContent = `ลบคำอวยพร ${targets.length} รายการ (${f==='all'?'ทั้งหมด':f}) ถาวร?`;
  document.getElementById('modalConfirm').onclick = () => deleteAll(f);
  document.getElementById('modalWrap').classList.add('show');
}
async function deleteAll(f) {
  closeModal();
  try {
    const params = f==='all' ? '?id=gt.0' : `?status=eq.${f}`;
    await sbAdmin.delete('wishes', params);
    if (f==='all') allWishes=[];
    else allWishes = allWishes.filter(w=>w.status!==f);
    updateStats(); renderWishes(); toast('✓ ลบทั้งหมดแล้ว');
  } catch(e) { toast('ลบไม่สำเร็จ',false); }
}

/* ── Settings ── */
async function loadSettings() {
  try {
    const rows = await sbAdmin.get('settings','?select=setting_key,setting_value');
    rows.forEach(r => { const el=document.getElementById(r.setting_key); if(el) el.value=r.setting_value; });
  } catch(e) {}
}

async function saveSettings() {
  const keys = ['header_th','header_en','subtitle_th','subtitle_en','bg_image'];
  setStatus('cfgStatus','loading','กำลังบันทึก...');
  try {
    for (const k of keys) {
      const val = document.getElementById(k)?.value?.trim() ?? '';
      await sbAdmin.patch('settings', `?setting_key=eq.${k}`, { setting_value: val });
    }
    setStatus('cfgStatus','ok','✓ บันทึกเรียบร้อย');
  } catch(e) { setStatus('cfgStatus','err','❌ '+e.message); }
}

/* ── Avatars ── */
async function loadAvatars() {
  try {
    const avs = await sbAdmin.get('avatars','?select=id,image_path&order=id.asc');
    const grid = document.getElementById('avGrid');
    if (!avs.length) { grid.innerHTML='<p style="color:var(--gray1);font-size:13px">ยังไม่มีรูป</p>'; return; }
    grid.innerHTML = avs.map(a=>`
      <div class="av-item" id="av_${a.id}">
        <img src="${escHtml(a.image_path)}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4140/4140037.png'">
        <button class="av-del" onclick="deleteAvatar(${a.id})">✕</button>
      </div>`).join('');
  } catch(e) {}
}

async function addAvatar() {
  const url = document.getElementById('newAvUrl').value.trim();
  if (!url) { toast('กรุณาใส่ URL รูป', false); return; }
  try {
    await sbAdmin.post('avatars', { image_path: url });
    document.getElementById('newAvUrl').value = '';
    loadAvatars(); toast('✓ เพิ่มรูปเรียบร้อย');
  } catch(e) { toast('เพิ่มไม่สำเร็จ', false); }
}

async function deleteAvatar(id) {
  if (!confirm('ลบรูปนี้?')) return;
  try {
    await sbAdmin.delete('avatars', `?id=eq.${id}`);
    document.getElementById('av_'+id)?.remove();
    toast('✓ ลบรูปแล้ว');
  } catch(e) { toast('ลบไม่สำเร็จ', false); }
}

/* ── Predefined ── */
async function loadPredefined() {
  try {
    const rows = await sbAdmin.get('predefined_wishes','?select=id,message_text&order=id.asc');
    const el = document.getElementById('pwList');
    if (!rows.length) { el.innerHTML='<p style="color:var(--gray1);font-size:13px">ยังไม่มีคำอวยพรสำเร็จรูป</p>'; return; }
    el.innerHTML = rows.map(r=>`
      <div class="pw-item" id="pw_${r.id}">
        <span>${escHtml(r.message_text)}</span>
        <button class="btn btn-sm btn-danger" onclick="deletePredefined(${r.id})">ลบ</button>
      </div>`).join('');
  } catch(e) {}
}

async function addPredefined() {
  const text = document.getElementById('newPwText').value.trim();
  if (!text) { toast('กรุณากรอกข้อความ', false); return; }
  try {
    await sbAdmin.post('predefined_wishes', { message_text: text });
    document.getElementById('newPwText').value = '';
    loadPredefined(); toast('✓ เพิ่มคำอวยพรเรียบร้อย');
  } catch(e) { toast('เพิ่มไม่สำเร็จ', false); }
}

async function deletePredefined(id) {
  if (!confirm('ลบคำอวยพรนี้?')) return;
  try {
    await sbAdmin.delete('predefined_wishes', `?id=eq.${id}`);
    document.getElementById('pw_'+id)?.remove();
    toast('✓ ลบแล้ว');
  } catch(e) { toast('ลบไม่สำเร็จ', false); }
}

/* ── Tab ── */
function switchTab(id, el) {
  document.getElementById('avTab').style.display = 'none';
  document.getElementById('pwTab').style.display = 'none';
  document.getElementById(id).style.display = 'block';
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

/* ── Helpers ── */
function setStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'status-row ' + type;
  el.style.display = 'flex';
  el.innerHTML = (type==='loading'?'<div class="spin"></div>':'') + '<span>'+msg+'</span>';
  if (type==='ok') setTimeout(()=>el.style.display='none', 2500);
}
function toast(msg, ok=true) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}
function closeModal() { document.getElementById('modalWrap').classList.remove('show'); }

/* ── Init ── */
if (sbAuth.restore()) showDash();
</script>
</body>
</html>
