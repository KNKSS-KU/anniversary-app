<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 ปี แห่งความภาคภูมิใจ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Submit Modal */
        .modal-content.submit-form { transform:rotate(0deg); max-width:480px; padding:30px; }
        .submit-form h2 { color:var(--brand-grey-2); margin-top:0; }
        .form-row { margin-bottom:15px; text-align:left; }
        .form-row label { display:block; font-weight:bold; margin-bottom:5px; font-size:0.9rem; color:var(--brand-grey-1); }
        .form-row input, .form-row textarea, .form-row select {
            width:100%; padding:10px 12px; border:1px solid #ddd;
            border-radius:8px; font-family:'Mali',cursive; font-size:0.95rem; box-sizing:border-box;
        }
        .form-row input:focus, .form-row textarea:focus { border-color:var(--brand-orange); outline:none; }
        .form-row textarea { resize:vertical; min-height:80px; }
        .avatar-grid { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
        .avatar-option {
            width:55px; height:55px; border-radius:50%;
            border:3px solid transparent; cursor:pointer; object-fit:cover; transition:0.2s;
        }
        .avatar-option:hover { transform:scale(1.1); }
        .avatar-option.selected { border-color:var(--brand-orange); box-shadow:0 0 0 2px var(--brand-orange); }
        .error-msg { color:#e74c3c; background:#fdecea; padding:10px; border-radius:8px; font-size:0.9rem; display:none; margin-bottom:10px; }
        #submitBtn { width:100%; margin-top:10px; font-size:1.1rem; padding:12px; }
        #submitBtn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
        .divider-or { text-align:center; color:#bbb; margin:10px 0; font-size:0.85rem; }
        /* Modal polaroid ใหญ่ */
        .polaroid-large { max-width:380px; padding:10px 10px 60px 10px; }
        .quote-box { background:#fffbf5; border-radius:10px; padding:15px; margin-top:10px; }
        .small-text { font-size:0.85rem; color:var(--brand-grey-1); margin:0 0 8px 0; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <span id="btn-th" class="lang-option active" onclick="changeLanguage('th')">TH</span>
        <span class="divider">|</span>
        <span id="btn-en" class="lang-option" onclick="changeLanguage('en')">EN</span>
    </div>

    <header class="glass-header">
        <h1 id="headerTitle" data-i18n="header_title">30 ปี แห่งความภาคภูมิใจ</h1>
        <p id="headerSubtitle" data-i18n="header_subtitle">คลิกที่รูปเพื่ออ่านคำอวยพรจากเพื่อนพนักงาน</p>
        <button onclick="openSubmitModal()" data-i18n="btn_write">+ เขียนคำอวยพร</button>
    </header>

    <div class="wishing-area" id="wishArea"></div>

    <!-- Modal: อ่านคำอวยพร (ต้นแบบเดิม) -->
    <div id="wishModal" class="modal">
        <div class="modal-content polaroid-large">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <img id="modalImg" src="" alt="User Image">
                <h2 id="modalName">User Name</h2>
                <p id="modalDept" class="dept">Department</p>
                <hr>
                <div class="quote-box">
                    <p class="small-text">
                        <span data-i18n="modal_topic_label">คำอวยพร:</span>
                    </p>
                    <h3 id="modalMsgB" class="wishing-text">...</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: เขียนคำอวยพร -->
    <div id="submitModal" class="modal">
        <div class="modal-content submit-form">
            <span class="close" onclick="closeSubmitModal()">&times;</span>
            <h2>✍️ เขียนคำอวยพร</h2>
            <div class="form-row">
                <label>ชื่อ *</label>
                <input type="text" id="wishName" placeholder="ชื่อของคุณ" maxlength="100">
            </div>
            <div class="form-row">
                <label>แผนก *</label>
                <input type="text" id="wishDept" placeholder="แผนกของคุณ" maxlength="100">
            </div>
            <div class="form-row">
                <label>เลือกรูปโปรไฟล์</label>
                <div class="avatar-grid" id="avatarGrid"><small style="color:#aaa">กำลังโหลด...</small></div>
            </div>
            <div class="form-row">
                <label>คำอวยพรสำเร็จรูป</label>
                <select id="predefinedSelect" onchange="usePredefined()">
                    <option value="">— เลือกคำอวยพร —</option>
                </select>
            </div>
            <div class="divider-or">— หรือพิมพ์เอง —</div>
            <div class="form-row">
                <label>คำอวยพร *</label>
                <textarea id="wishMessage" placeholder="เขียนคำอวยพรของคุณที่นี่..." maxlength="500"></textarea>
            </div>
            <div class="error-msg" id="submitError"></div>
            <button id="submitBtn" onclick="submitWish()">ส่งคำอวยพร 🎉</button>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>
</body>
</html>
